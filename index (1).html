<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Find Your Film</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #056aa2, #000);
  color: #fff;
  text-align: center;
}

/* Neon Glow */
h1, h2 {
  color: #0ff;
  text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
}

button {
  padding: 12px 20px;
  background: transparent;
  border: 2px solid #0ff;
  color: #0ff;
  cursor: pointer;
  border-radius: 5px;
  box-shadow: 0 0 10px #0ff;
}

button:hover {
  background: #0ff;
  color: #000;
}

select {
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
  background: #111;
  color: #0ff;
  border: 1px solid #0ff;
}

/* Sections */
#home {
  padding: 100px 20px;
}

#explore {
  display: none;
  padding: 20px;
}

/* Movie Grid */
#results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Movie Card */
.movie-card {
  background: #111;
  border: 1px solid #0ff;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 0 10px #0ff;
}

.movie-card img {
  width: 100%;
  border-radius: 20px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home">
  <h1>🎬 Find Your Film</h1>
  <button onclick="openExplore()">Explore</button>
</div>

<!-- EXPLORE -->
<div id="explore">
  <h2>Select Your Preferences</h2>

  <select id="genre">
    <option value="action">Action</option>
    <option value="comedy">Comedy</option>
    <option value="horror">Horror</option>
  </select>

  <select id="type">
    <option value="movie">Movie</option>
    <option value="series">Series</option>
  </select>

  <select id="language">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="ko">Korean</option>
  </select>

  <br>

  <button onclick="getMovies()">Get Recommendations</button>

  <div id="results"></div>
</div>

/* Filter Logic */
function getMovies() {

  const genre = document.getElementById("genre").value;
  const type = document.getElementById("type").value;
  const lang = document.getElementById("language").value;

  const filtered = moviesDB.filter(m =>
    m.genre === genre &&
    m.type === type &&
    m.lang === lang
  );

  const results = document.getElementById("results");
  results.innerHTML = "";

  if (filtered.length === 0) {
    results.innerHTML = "<p>No movies found</p>";
    return;
  }

  filtered.forEach(movie => {
    results.innerHTML += `
      <div class="movie-card">
        <img src="${movie.img}">
        <h3>${movie.title}</h3>
        </div>
    `;
  });
}
